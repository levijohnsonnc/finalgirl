<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 40" preserveAspectRatio="none">
  <defs>
    <!-- Gradient for bubbles - light top, dark bottom -->
    <radialGradient id="serumBubble1" cx="50%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#8ff" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#0aa" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#066" stop-opacity="0.6"/>
    </radialGradient>
    <radialGradient id="serumBubble2" cx="40%" cy="25%" r="50%">
      <stop offset="0%" stop-color="#aff" stop-opacity="0.45"/>
      <stop offset="70%" stop-color="#088" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#044" stop-opacity="0.65"/>
    </radialGradient>
    <radialGradient id="serumBubble3" cx="45%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#bff" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#0bb" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#055" stop-opacity="0.55"/>
    </radialGradient>
  </defs>
  
  <!-- Subtle wavy flow lines - organic curves in cyan tones -->
  <path d="M0 8 Q18 4 36 10 T72 6 T108 12 T150 8" 
        fill="none" stroke="#0aa" stroke-width="1.5" stroke-opacity="0.3"/>
  <path d="M0 20 Q22 16 44 22 T88 18 T132 24 T150 20" 
        fill="none" stroke="#088" stroke-width="2" stroke-opacity="0.25"/>
  <path d="M0 32 Q15 28 30 34 T60 30 T90 36 T120 32 T150 34" 
        fill="none" stroke="#099" stroke-width="1.2" stroke-opacity="0.22"/>
  
  <!-- Medium bubbles with volume -->
  <ellipse cx="20" cy="12" rx="6" ry="5" fill="url(#serumBubble1)"/>
  <ellipse cx="55" cy="28" rx="7" ry="6" fill="url(#serumBubble2)"/>
  <ellipse cx="95" cy="14" rx="5" ry="5" fill="url(#serumBubble3)"/>
  <ellipse cx="125" cy="30" rx="6" ry="5" fill="url(#serumBubble1)"/>
  <ellipse cx="140" cy="10" rx="4" ry="4" fill="url(#serumBubble2)"/>
  
  <!-- Small bubbles for depth -->
  <ellipse cx="35" cy="32" rx="3.5" ry="3" fill="url(#serumBubble3)"/>
  <ellipse cx="75" cy="8" rx="3" ry="3" fill="url(#serumBubble1)"/>
  <ellipse cx="110" cy="35" rx="3.5" ry="3" fill="url(#serumBubble2)"/>
  
  <!-- Tiny bubbles scattered -->
  <circle cx="12" cy="24" r="1.5" fill="#0bb" fill-opacity="0.35"/>
  <circle cx="45" cy="18" r="2" fill="#0aa" fill-opacity="0.3"/>
  <circle cx="68" cy="35" r="1.5" fill="#0cc" fill-opacity="0.32"/>
  <circle cx="85" cy="25" r="1.2" fill="#0bb" fill-opacity="0.28"/>
  <circle cx="118" cy="18" r="1.5" fill="#0aa" fill-opacity="0.3"/>
  <circle cx="135" cy="22" r="1.2" fill="#0cc" fill-opacity="0.25"/>
  
  <!-- Highlight accents on top of larger bubbles -->
  <ellipse cx="18" cy="10" rx="2.5" ry="1.5" fill="#cff" fill-opacity="0.3"/>
  <ellipse cx="53" cy="26" rx="3" ry="1.5" fill="#dff" fill-opacity="0.25"/>
  <ellipse cx="93" cy="12" rx="2" ry="1.2" fill="#cff" fill-opacity="0.28"/>
  <ellipse cx="123" cy="28" rx="2.5" ry="1.2" fill="#dff" fill-opacity="0.22"/>
</svg>