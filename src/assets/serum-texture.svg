<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" preserveAspectRatio="none">
  <defs>
    <!-- Central bioluminescent glow -->
    <radialGradient id="coreGlow1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#00ffff" stop-opacity="0.6"/>
      <stop offset="40%" stop-color="#00cccc" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#006666" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coreGlow2" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#33ffff" stop-opacity="0.5"/>
      <stop offset="35%" stop-color="#00aaaa" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#004444" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Ethereal bubble gradients -->
    <radialGradient id="etherBubble1" cx="40%" cy="25%" r="50%">
      <stop offset="0%" stop-color="#ccffff" stop-opacity="0.6"/>
      <stop offset="30%" stop-color="#66dddd" stop-opacity="0.45"/>
      <stop offset="70%" stop-color="#229999" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#005555" stop-opacity="0.65"/>
    </radialGradient>
    <radialGradient id="etherBubble2" cx="35%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#eeffff" stop-opacity="0.55"/>
      <stop offset="40%" stop-color="#55cccc" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#003333" stop-opacity="0.6"/>
    </radialGradient>
    <radialGradient id="etherBubble3" cx="45%" cy="18%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="25%" stop-color="#88eeee" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#004444" stop-opacity="0.55"/>
    </radialGradient>
    
    <!-- Energy particle glow -->
    <radialGradient id="particleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#00ffff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00aaaa" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <!-- Bioluminescent glow zones -->
  <ellipse cx="50" cy="30" rx="55" ry="35" fill="url(#coreGlow1)"/>
  <ellipse cx="130" cy="35" rx="60" ry="38" fill="url(#coreGlow2)"/>
  <ellipse cx="90" cy="25" rx="40" ry="25" fill="url(#coreGlow1)"/>
  <ellipse cx="170" cy="28" rx="35" ry="28" fill="url(#coreGlow2)"/>
  
  <!-- Flowing energy paths -->
  <path d="M0 12 Q25 6 50 14 T100 8 T150 16 T200 10" 
        fill="none" stroke="#00dddd" stroke-width="2.5" stroke-opacity="0.35" stroke-linecap="round"/>
  <path d="M0 30 Q30 24 60 32 T120 26 T180 34 T200 28" 
        fill="none" stroke="#00bbbb" stroke-width="3" stroke-opacity="0.3" stroke-linecap="round"/>
  <path d="M0 48 Q20 42 40 50 T80 44 T120 52 T160 46 T200 50" 
        fill="none" stroke="#00cccc" stroke-width="2" stroke-opacity="0.28" stroke-linecap="round"/>
  
  <!-- Secondary light streams -->
  <path d="M0 20 Q40 14 80 22 T160 18 T200 22" 
        fill="none" stroke="#33eeee" stroke-width="1.5" stroke-opacity="0.25"/>
  <path d="M0 40 Q25 36 50 42 T100 38 T150 44 T200 40" 
        fill="none" stroke="#22dddd" stroke-width="1.8" stroke-opacity="0.22"/>
  
  <!-- Medium ethereal bubbles -->
  <ellipse cx="28" cy="18" rx="10" ry="9" fill="url(#etherBubble1)"/>
  <ellipse cx="75" cy="42" rx="12" ry="10" fill="url(#etherBubble2)"/>
  <ellipse cx="125" cy="16" rx="9" ry="8" fill="url(#etherBubble3)"/>
  <ellipse cx="170" cy="45" rx="11" ry="9" fill="url(#etherBubble1)"/>
  <ellipse cx="190" cy="20" rx="8" ry="7" fill="url(#etherBubble2)"/>
  
  <!-- Small bubbles -->
  <ellipse cx="50" cy="48" rx="6" ry="5" fill="url(#etherBubble3)"/>
  <ellipse cx="100" cy="12" rx="5.5" ry="5" fill="url(#etherBubble1)"/>
  <ellipse cx="145" cy="52" rx="6" ry="5" fill="url(#etherBubble2)"/>
  
  <!-- Bright particle suspension -->
  <circle cx="18" cy="32" r="2.5" fill="url(#particleGlow)"/>
  <circle cx="62" cy="22" r="3" fill="url(#particleGlow)"/>
  <circle cx="95" cy="50" r="2.5" fill="url(#particleGlow)"/>
  <circle cx="115" cy="35" r="2" fill="url(#particleGlow)"/>
  <circle cx="155" cy="28" r="2.5" fill="url(#particleGlow)"/>
  <circle cx="185" cy="38" r="2" fill="url(#particleGlow)"/>
  
  <!-- Tiny floating particles -->
  <circle cx="35" cy="40" r="1.2" fill="#88ffff" fill-opacity="0.6"/>
  <circle cx="85" cy="30" r="1.5" fill="#99ffff" fill-opacity="0.55"/>
  <circle cx="135" cy="38" r="1.2" fill="#88ffff" fill-opacity="0.5"/>
  <circle cx="165" cy="15" r="1.5" fill="#aaffff" fill-opacity="0.55"/>
  
  <!-- Highlight accents on bubbles -->
  <ellipse cx="25" cy="14" rx="4" ry="2.5" fill="#ffffff" fill-opacity="0.4"/>
  <ellipse cx="72" cy="38" rx="5" ry="2.5" fill="#ffffff" fill-opacity="0.35"/>
  <ellipse cx="122" cy="12" rx="3.5" ry="2" fill="#ffffff" fill-opacity="0.38"/>
  <ellipse cx="167" cy="41" rx="4.5" ry="2" fill="#ffffff" fill-opacity="0.32"/>
</svg>