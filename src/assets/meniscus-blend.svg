<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 60" preserveAspectRatio="none">
  <defs>
    <!-- Curved meniscus gradient - cyan to murky to blood -->
    <linearGradient id="meniscusGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00cccc" stop-opacity="0.9"/>
      <stop offset="25%" stop-color="#338888" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#554444" stop-opacity="0.85"/>
      <stop offset="75%" stop-color="#663333" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#881818" stop-opacity="0"/>
    </linearGradient>
    
    <!-- Surface tension curve gradient - top edge -->
    <linearGradient id="tensionTop" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#55dddd" stop-opacity="0.5"/>
      <stop offset="40%" stop-color="#445555" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#442222" stop-opacity="0"/>
    </linearGradient>
    
    <!-- Surface tension curve gradient - bottom edge -->
    <linearGradient id="tensionBottom" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#008888" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#332222" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#220000" stop-opacity="0"/>
    </linearGradient>
    
    <!-- Mixed bubble gradients -->
    <radialGradient id="mixedBubble1" cx="40%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#77aaaa" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#554444" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#332222" stop-opacity="0.6"/>
    </radialGradient>
    <radialGradient id="mixedBubble2" cx="45%" cy="25%" r="50%">
      <stop offset="0%" stop-color="#889999" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#443333" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#221111" stop-opacity="0.55"/>
    </radialGradient>
    
    <!-- Murky zone glow -->
    <radialGradient id="murkyGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#446666" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#332222" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <!-- Main curved meniscus shape - concave on left (serum side) -->
  <path d="M0 0 
           Q8 5 12 15 
           Q14 30 12 45 
           Q8 55 0 60 
           L40 60 
           L40 0 
           Z" 
        fill="url(#meniscusGrad)"/>
  
  <!-- Surface tension curve at top -->
  <path d="M0 0 Q10 3 15 8 Q20 4 28 2" 
        fill="none" stroke="url(#tensionTop)" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Surface tension curve at bottom -->
  <path d="M0 60 Q8 58 14 54 Q18 57 25 58" 
        fill="none" stroke="url(#tensionBottom)" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Murky transition zone -->
  <ellipse cx="18" cy="30" rx="14" ry="25" fill="url(#murkyGlow)"/>
  
  <!-- Mixed bubbles at the interface -->
  <ellipse cx="8" cy="18" rx="4" ry="3.5" fill="url(#mixedBubble1)"/>
  <ellipse cx="14" cy="38" rx="5" ry="4" fill="url(#mixedBubble2)"/>
  <ellipse cx="6" cy="48" rx="3.5" ry="3" fill="url(#mixedBubble1)"/>
  <ellipse cx="12" cy="25" rx="3" ry="2.5" fill="url(#mixedBubble2)"/>
  
  <!-- Small mixed particles -->
  <circle cx="10" cy="12" r="2" fill="#668888" fill-opacity="0.4"/>
  <circle cx="16" cy="32" r="2.5" fill="#555555" fill-opacity="0.35"/>
  <circle cx="8" cy="42" r="2" fill="#667777" fill-opacity="0.38"/>
  <circle cx="18" cy="52" r="1.8" fill="#554444" fill-opacity="0.35"/>
  
  <!-- Tiny interaction particles -->
  <circle cx="5" cy="28" r="1.2" fill="#77aaaa" fill-opacity="0.45"/>
  <circle cx="12" cy="55" r="1" fill="#665555" fill-opacity="0.4"/>
  <circle cx="4" cy="8" r="1.3" fill="#55bbbb" fill-opacity="0.5"/>
  <circle cx="20" cy="20" r="1.5" fill="#553333" fill-opacity="0.35"/>
</svg>