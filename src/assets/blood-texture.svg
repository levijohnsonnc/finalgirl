<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 60" preserveAspectRatio="none">
  <defs>
    <!-- Subsurface scattering gradient - light penetrating blood -->
    <radialGradient id="subsurface1" cx="30%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ff6666" stop-opacity="0.5"/>
      <stop offset="40%" stop-color="#cc2222" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#330000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="subsurface2" cx="70%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#ff4444" stop-opacity="0.45"/>
      <stop offset="35%" stop-color="#aa1111" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#220000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="subsurface3" cx="50%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#ff5555" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#991111" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#110000" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Deep bubble gradients with light refraction -->
    <radialGradient id="deepBubble" cx="35%" cy="25%" r="50%">
      <stop offset="0%" stop-color="#ff8888" stop-opacity="0.7"/>
      <stop offset="30%" stop-color="#cc4444" stop-opacity="0.55"/>
      <stop offset="70%" stop-color="#661111" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#220000" stop-opacity="0.9"/>
    </radialGradient>
    <radialGradient id="midBubble" cx="40%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#ffaaaa" stop-opacity="0.6"/>
      <stop offset="40%" stop-color="#aa3333" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#440000" stop-opacity="0.85"/>
    </radialGradient>
    <radialGradient id="shallowBubble" cx="45%" cy="15%" r="50%">
      <stop offset="0%" stop-color="#ffcccc" stop-opacity="0.55"/>
      <stop offset="25%" stop-color="#ee5555" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#550000" stop-opacity="0.8"/>
    </radialGradient>
    
    <!-- Density patches - dark clots -->
    <radialGradient id="densityDark1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#110000" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#220000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="densityDark2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a0000" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1a0000" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Plasma light patches -->
    <radialGradient id="plasmaLight" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#bb3333" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#992222" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <!-- Subsurface scattering glow zones -->
  <ellipse cx="80" cy="30" rx="65" ry="35" fill="url(#subsurface1)"/>
  <ellipse cx="200" cy="35" rx="70" ry="40" fill="url(#subsurface2)"/>
  <ellipse cx="140" cy="45" rx="50" ry="30" fill="url(#subsurface3)"/>
  
  <!-- Dense dark clot patches -->
  <ellipse cx="55" cy="35" rx="30" ry="22" fill="url(#densityDark1)"/>
  <ellipse cx="170" cy="25" rx="35" ry="18" fill="url(#densityDark2)"/>
  <ellipse cx="260" cy="40" rx="28" ry="20" fill="url(#densityDark1)"/>
  
  <!-- Plasma lighter regions -->
  <ellipse cx="120" cy="20" rx="25" ry="15" fill="url(#plasmaLight)"/>
  <ellipse cx="230" cy="50" rx="30" ry="18" fill="url(#plasmaLight)"/>
  
  <!-- Organic turbulence - thick flowing vein paths -->
  <path d="M0 10 Q40 3 80 15 T160 8 T240 18 T300 10" 
        fill="none" stroke="#220000" stroke-width="8" stroke-opacity="0.5" stroke-linecap="round"/>
  <path d="M0 30 Q50 22 100 35 T200 28 T300 32" 
        fill="none" stroke="#330000" stroke-width="10" stroke-opacity="0.45" stroke-linecap="round"/>
  <path d="M0 50 Q35 42 70 52 T140 45 T210 55 T280 48 T300 52" 
        fill="none" stroke="#220000" stroke-width="7" stroke-opacity="0.4" stroke-linecap="round"/>
  
  <!-- Secondary flowing lines -->
  <path d="M0 18 Q55 12 110 22 T220 16 T300 20" 
        fill="none" stroke="#440000" stroke-width="4" stroke-opacity="0.35"/>
  <path d="M0 42 Q30 36 60 44 T120 38 T180 46 T240 40 T300 44" 
        fill="none" stroke="#330000" stroke-width="3.5" stroke-opacity="0.3"/>
  
  <!-- Large bubbles at different depths -->
  <ellipse cx="35" cy="18" rx="14" ry="12" fill="url(#deepBubble)"/>
  <ellipse cx="95" cy="42" rx="16" ry="14" fill="url(#midBubble)"/>
  <ellipse cx="160" cy="20" rx="12" ry="11" fill="url(#shallowBubble)"/>
  <ellipse cx="220" cy="48" rx="15" ry="13" fill="url(#deepBubble)"/>
  <ellipse cx="275" cy="15" rx="11" ry="10" fill="url(#midBubble)"/>
  
  <!-- Medium bubbles -->
  <ellipse cx="65" cy="48" rx="9" ry="8" fill="url(#shallowBubble)"/>
  <ellipse cx="130" cy="12" rx="8" ry="7" fill="url(#deepBubble)"/>
  <ellipse cx="190" cy="52" rx="9" ry="8" fill="url(#midBubble)"/>
  <ellipse cx="250" cy="28" rx="8" ry="7" fill="url(#shallowBubble)"/>
  
  <!-- Small bubbles scattered for depth -->
  <circle cx="22" cy="35" r="4" fill="#440000" fill-opacity="0.55"/>
  <circle cx="80" cy="25" r="4.5" fill="#330000" fill-opacity="0.5"/>
  <circle cx="115" cy="50" r="4" fill="#550000" fill-opacity="0.5"/>
  <circle cx="150" cy="38" r="3.5" fill="#440000" fill-opacity="0.45"/>
  <circle cx="205" cy="22" r="4" fill="#330000" fill-opacity="0.48"/>
  <circle cx="240" cy="55" r="3.5" fill="#550000" fill-opacity="0.42"/>
  <circle cx="285" cy="42" r="4" fill="#440000" fill-opacity="0.4"/>
  
  <!-- Tiny bubbles for detail -->
  <circle cx="45" cy="28" r="2" fill="#660000" fill-opacity="0.4"/>
  <circle cx="105" cy="35" r="2.5" fill="#550000" fill-opacity="0.38"/>
  <circle cx="175" cy="10" r="2" fill="#660000" fill-opacity="0.35"/>
  <circle cx="265" cy="35" r="2.5" fill="#550000" fill-opacity="0.4"/>
  
  <!-- Highlight accents on large bubbles - light refraction -->
  <ellipse cx="31" cy="13" rx="6" ry="3.5" fill="#ffcccc" fill-opacity="0.35"/>
  <ellipse cx="91" cy="37" rx="7" ry="3.5" fill="#ffdddd" fill-opacity="0.3"/>
  <ellipse cx="156" cy="15" rx="5" ry="2.5" fill="#ffcccc" fill-opacity="0.32"/>
  <ellipse cx="216" cy="43" rx="6.5" ry="3" fill="#ffdddd" fill-opacity="0.28"/>
  <ellipse cx="272" cy="11" rx="4.5" ry="2.5" fill="#ffcccc" fill-opacity="0.3"/>
</svg>